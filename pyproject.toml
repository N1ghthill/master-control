[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mastercontrol"
version = "0.1.0"
description = "MasterControl Debian-first Linux orchestrator"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "PyYAML>=6.0,<7.0",
]

[tool.setuptools.packages.find]
include = ["mastercontrol*"]
