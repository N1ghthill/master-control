name: Feature request
description: Propose a new capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator or engineering problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Security, policy, UX, or runtime constraints to preserve

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
