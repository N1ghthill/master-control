name: Bug report
description: Report a defect in Master Control
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Commands, inputs, and observed behavior
      placeholder: |
        1. Run ...
        2. Send ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provider, OS, Python version, and any relevant host details
    validations:
      required: true
